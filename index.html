<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex,nofollow">
    <title>爬虫類のお世話スケジュール🦎</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #65a30d;
            --clean-color: #78350f;
            --danger: #ef4444;
            --text: #1e293b;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 15px; color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }
        .header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.3rem; color: #365314; margin: 0; }
        .sub-info { font-size: 0.8rem; color: #64748b; margin-top: 5px; }

        .pet-list { display: grid; gap: 15px; margin-bottom: 30px; }
        .pet-card {
            background: var(--card-bg);
            border-radius: 24px; padding: 18px;
            display: flex; align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            position: relative; border: 1px solid #e2e8f0;
        }
        .pet-card.danger { border: 2px solid var(--danger); background: #fef2f2; }
        
        .pet-img-container {
            width: 80px; height: 80px; border-radius: 18px;
            overflow: hidden; margin-right: 15px; background: #f1f5f9; flex-shrink: 0;
        }
        .pet-img { width: 100%; height: 100%; object-fit: cover; }
        
        .pet-info { flex-grow: 1; min-width: 0; }
        .pet-name-row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
        .pet-name { font-weight: bold; font-size: 1.15rem; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pet-sex { font-size: 0.85rem; color: #64748b; white-space: nowrap; flex-shrink: 0; }
        .pet-meta { font-size: 0.75rem; color: #64748b; margin: 0; }
        
        .care-info { font-size: 0.8rem; margin-top: 10px; color: #475569; line-height: 1.5; }
        .care-item { margin-bottom: 4px; }
        .care-item b { color: #334155; }
        
        .danger-msg { color: var(--danger); font-weight: bold; font-size: 0.75rem; margin-top: 5px; display: none; }
        .pet-card.danger .danger-msg { display: block; }

        .btn-group { display: flex; gap: 8px; margin-top: 12px; }
        button { border: none; border-radius: 12px; padding: 10px; font-size: 0.8rem; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        .btn-feed { background: var(--primary); color: white; flex: 2; }
        .btn-clean { background: var(--clean-color); color: white; flex: 1.2; }
        
        .btn-edit { position: absolute; top: 10px; right: 10px; background: none; color: #cbd5e1; font-size: 1.6rem; padding: 5px; line-height: 1; }

        .fab {
            position: fixed; bottom: 25px; right: 20px;
            width: 60px; height: 60px; background: #3f6212;
            border-radius: 50%; color: white; font-size: 2rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); z-index: 50;
        }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 25px; border-radius: 28px; width: 92%; max-width: 400px; box-sizing: border-box; }
        input[type="text"], select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 1rem; box-sizing: border-box; }
        
        .file-label { display: block; width: 85px; height: 85px; border-radius: 50%; margin: 0 auto 15px; background: #f1f5f9; border: 2px dashed #cbd5e1; cursor: pointer; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #64748b; }
        #pImgPreview { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; display: none; }
        
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 200; align-items: center; justify-content: center; font-weight: bold; color: #365314; font-size: 1.2rem; }

        /* カレンダー */
        #calendarContainer {
            margin-top: 40px; margin-bottom: 120px;
            background: white; border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            padding: 15px; border: 1px solid #e2e8f0;
        }
        .cal-header { text-align: center; font-weight: bold; font-size: 1.1rem; margin-bottom: 12px; color: #365314; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
        .cal-day-label { font-size: 0.7rem; font-weight: bold; color: #64748b; padding-bottom: 5px; }
        .cal-day { background: #f8fafc; border-radius: 8px; min-height: 55px; padding: 2px; position: relative; border: 1px solid transparent; }
        .cal-day.today { background: #ecfdf5; border-color: #10b981; }
        .cal-day-num { position: absolute; top: 2px; left: 3px; font-size: 0.6rem; color: #94a3b8; }
        .cal-marks { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; max-height: 40px; overflow: hidden; }
        .cal-mark { border-radius: 3px; padding: 0 2px; font-size: 0.55rem; font-weight: bold; color: white; display: inline-block; min-width: 12px; }
        .mark-feed { background: var(--primary); }
        .mark-clean { background: var(--clean-color); }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">🦎 ゆっくり脱皮中・・</div>

<div class="header">
    <h1>爬虫類のお世話スケジュール🦎</h1>
    <div class="sub-info" id="currentInfo">...</div>
</div>

<div class="pet-list" id="petList"></div>

<div class="fab" onclick="openModal()">＋</div>

<div id="calendarContainer">
    <div class="cal-header" id="calHeader"></div>
    <div class="cal-grid" id="calGrid"></div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h2 id="modalTitle" style="margin-top:0; font-size: 1.2rem;">家族の設定</h2>
        <label class="file-label">
            <img id="pImgPreview">
            <span>📷 写真を選択</span>
            <input type="file" id="pImgInput" accept="image/*" style="display:none" onchange="previewAndCompressImage(this)">
        </label>
        <input type="text" id="pName" placeholder="お名前">
        <select id="pSex">
            <option value="不明">性別：不明</option>
            <option value="♂（オス）">♂（オス）</option>
            <option value="♀（メス）">♀（メス）</option>
        </select>
        <input type="text" id="pType" placeholder="種別：例 カメカブトトカゲ">
        <div class="btn-group">
            <button onclick="closeModal()" style="background:#f1f5f9; color:#475569; flex:1;">戻る</button>
            <button onclick="savePet()" style="background:var(--primary); color:white; flex:2;">保存</button>
        </div>
        <button id="delBtn" onclick="deletePet()" style="background:none; color:#ef4444; margin-top:25px; width:100%; font-size:0.8rem; display:none; border:1px solid #fee2e2; border-radius:10px; padding:8px;">⚠️ データを消去する</button>
    </div>
</div>

<script>
    const ENDPOINT = "https://script.google.com/macros/s/AKfycbzU9S0WxqRlBAjnuYcINfQwatbbwFQH0GKlZ8C9jYPG2smKBlsdcI8rNWMh64jy9RLm/exec";
    const WEEKS = ['日','月','火','水','木','金','土'];
    
    let pets = [];
    let editIndex = null;
    let base64Image = "";

    async function fetchData() {
        showLoading(true);
        try {
            const res = await fetch(ENDPOINT);
            pets = await res.json();
            render();
            renderCalendar();
        } catch(e) { console.error(e); }
        showLoading(false);
    }

    async function updateHeader() {
        const now = new Date();
        const dateStr = `${now.getMonth()+1}/${now.getDate()}(${WEEKS[now.getDay()]})`;
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=34.7333&longitude=135.5000&current_weather=true');
            const data = await res.json();
            document.getElementById('currentInfo').innerText = `${dateStr} 新大阪:${Math.round(data.current_weather.temperature)}℃`;
        } catch(e) { document.getElementById('currentInfo').innerText = dateStr; }
    }

    function previewAndCompressImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 300; 
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    base64Image = canvas.toDataURL('image/jpeg', 0.7);
                    const preview = document.getElementById('pImgPreview');
                    preview.src = base64Image; preview.style.display = "block";
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function getElapsedText(timestamp) {
        if(!timestamp) return '--/--';
        const now = new Date();
        const past = new Date(timestamp);
        const diffMs = now - past;
        const d = Math.floor(diffMs / (1000 * 60 * 60 * 24));
        const h = Math.floor(diffMs / (1000 * 60 * 60));
        const dateStr = `${past.getMonth()+1}/${past.getDate()}(${WEEKS[past.getDay()]})`;
        return `${dateStr} ⇨ ${d}日(${h}時間)経過`;
    }

    function render() {
        const list = document.getElementById('petList');
        list.innerHTML = '';
        const now = new Date();

        pets.forEach((pet, index) => {
            const lastFeedTime = pet.lastFeed || now.getTime();
            const diffHours = Math.floor((now.getTime() - lastFeedTime) / (1000 * 60 * 60));
            const isDanger = diffHours >= 72;

            const card = document.createElement('div');
            card.className = `pet-card ${isDanger ? 'danger' : ''}`;
            card.innerHTML = `
                <div class="pet-img-container"><img src="${pet.img || ''}" class="pet-img"></div>
                <div class="pet-info">
                    <div class="pet-name-row">
                        <p class="pet-name">${pet.name}</p>
                        <span class="pet-sex">${pet.sex}</span>
                    </div>
                    <p class="pet-meta">${pet.type}</p>
                    <div class="care-info">
                        <div class="care-item">🍚 <b>ご飯:</b> ${getElapsedText(pet.lastFeed)}</div>
                        <div class="care-item">✨ <b>掃除:</b> ${getElapsedText(pet.lastClean)}</div>
                    </div>
                    <p class="danger-msg">⚠️ 72時間経過しています！</p>
                    <div class="btn-group">
                        <button class="btn-feed" onclick="confirmAction(${index}, 'feed')">ご飯をあげた</button>
                        <button class="btn-clean" onclick="confirmAction(${index}, 'clean')">掃除</button>
                    </div>
                </div>
                <button class="btn-edit" onclick="openModal(${index})">✎</button>
            `;
            list.appendChild(card);
        });
    }

    async function confirmAction(index, type) {
        if (confirm(`本当に${type==='feed'?'ご飯をあげましたか？':'お掃除をしましたか？'}`)) {
            const pet = pets[index];
            const now = new Date().getTime();
            if (type === 'feed') pet.lastFeed = now;
            else pet.lastClean = now;
            await syncToGoogle(pet);
            render();
            renderCalendar();
        }
    }

    async function savePet() {
        const pet = {
            id: editIndex !== null ? pets[editIndex].id : new Date().getTime().toString(),
            name: document.getElementById('pName').value,
            sex: document.getElementById('pSex').value,
            type: document.getElementById('pType').value,
            img: base64Image || (editIndex !== null ? pets[editIndex].img : ""),
            lastFeed: editIndex !== null ? pets[editIndex].lastFeed : new Date().getTime(),
            lastClean: editIndex !== null ? pets[editIndex].lastClean : ""
        };
        await syncToGoogle(pet);
        closeModal();
        fetchData();
    }

    async function deletePet() {
        if(confirm('この子のデータを消去しますか？スプレッドシートからも完全に消えます。')) {
            showLoading(true);
            try {
                await fetch(ENDPOINT, {
                    method: "POST",
                    body: JSON.stringify({ action: 'DELETE', id: pets[editIndex].id })
                });
                closeModal();
                fetchData();
            } catch(e) { alert("削除に失敗しました"); }
            showLoading(false);
        }
    }

    async function syncToGoogle(petData) {
        showLoading(true);
        try { await fetch(ENDPOINT, { method: "POST", body: JSON.stringify(petData) }); }
        catch(e) { alert("通信エラー"); }
        showLoading(false);
    }

    function openModal(i = null) {
        editIndex = i; document.getElementById('modal').style.display = 'flex';
        document.getElementById('delBtn').style.display = i !== null ? 'block' : 'none';
        const preview = document.getElementById('pImgPreview');
        if (i !== null) {
            const p = pets[i];
            document.getElementById('pName').value = p.name;
            document.getElementById('pSex').value = p.sex;
            document.getElementById('pType').value = p.type;
            base64Image = p.img;
            if(base64Image) { preview.src = base64Image; preview.style.display = "block"; } else { preview.style.display = "none"; }
            document.getElementById('modalTitle').innerText = 'お名前を編集';
        } else {
            document.getElementById('pName').value = ''; document.getElementById('pType').value = ''; document.getElementById('pImgInput').value = '';
            base64Image = ""; preview.style.display = "none"; document.getElementById('modalTitle').innerText = '家族を登録';
        }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function showLoading(show) { document.getElementById('loading').style.display = show ? 'flex' : 'none'; }

    function renderCalendar() {
        const now = new Date();
        const year = now.getFullYear(); const month = now.getMonth();
        document.getElementById('calHeader').innerText = `${year}年${month+1}月`;
        const grid = document.getElementById('calGrid');
        grid.innerHTML = '';
        WEEKS.forEach(w => grid.innerHTML += `<div class="cal-day-label">${w}</div>`);
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
        for(let i=1; i<=lastDate; i++) {
            const isToday = i === now.getDate();
            let marksHtml = "";
            let count = 0;
            pets.forEach(p => {
                if(count >= 6) return;
                const fDate = new Date(p.lastFeed);
                const cDate = new Date(p.lastClean);
                // ご飯マーク（緑）
                if(p.lastFeed && fDate.getDate() === i && fDate.getMonth() === month && fDate.getFullYear() === year) {
                    marksHtml += `<span class="cal-mark mark-feed">${p.name[0]}</span>`;
                    count++;
                }
                // 掃除マーク（茶）
                if(count < 6 && p.lastClean && cDate.getDate() === i && cDate.getMonth() === month && cDate.getFullYear() === year) {
                    marksHtml += `<span class="cal-mark mark-clean">${p.name[0]}</span>`;
                    count++;
                }
            });
            grid.innerHTML += `<div class="cal-day ${isToday?'today':''}"><span class="cal-day-num">${i}</span><div class="cal-marks">${marksHtml}</div></div>`;
        }
    }

    updateHeader();
    fetchData();
</script>
</body>
</html>
